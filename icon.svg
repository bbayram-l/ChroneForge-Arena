<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1A1A2E" />
      <stop offset="70%" stop-color="#0F0F1A" />
      <stop offset="100%" stop-color="#05050A" />
    </radialGradient>

    <filter id="glowPink" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="glowBlue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <linearGradient id="metalDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3A3A4A" />
      <stop offset="100%" stop-color="#161622" />
    </linearGradient>

    <linearGradient id="metalLight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#555566" />
      <stop offset="100%" stop-color="#222233" />
    </linearGradient>

    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFD700" />
      <stop offset="50%" stop-color="#FF8C00" />
      <stop offset="100%" stop-color="#B22222" />
    </linearGradient>
  </defs>

  <rect width="500" height="500" rx="90" fill="url(#bgGrad)" stroke="#2D2D44" stroke-width="4"/>

  <g transform="translate(250, 210)">
    <circle r="160" fill="none" stroke="#D946EF" stroke-width="3" opacity="0.4" filter="url(#glowPink)"/>
    <circle r="145" fill="none" stroke="#06B6D4" stroke-width="6" stroke-dasharray="12 18" filter="url(#glowBlue)"/>
    <circle r="130" fill="none" stroke="#8B5CF6" stroke-width="1" opacity="0.6"/>
    <circle r="175" fill="none" stroke="#38BDF8" stroke-width="2" stroke-dasharray="60 40" opacity="0.5" filter="url(#glowBlue)">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="20s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g stroke="#06B6D4" stroke-width="1.5" stroke-linejoin="round">
    <polygon points="250,40 280,90 220,90" fill="url(#metalDark)" />
    <polygon points="170,90 210,130 150,160" fill="url(#metalDark)" />
    <polygon points="330,90 290,130 350,160" fill="url(#metalDark)" />

    <polygon points="150,220 180,160 210,210 190,260" fill="url(#metalLight)" />
    <polygon points="350,220 320,160 290,210 310,260" fill="url(#metalLight)" />

    <polygon points="220,90 280,90 290,180 250,250 210,180" fill="url(#metalLight)" />
    
    <polygon points="250,100 265,130 250,160 235,130" fill="#D946EF" filter="url(#glowPink)" stroke="none"/>

    <polygon points="250,250 290,180 270,260 250,290" fill="url(#metalDark)" />
    <polygon points="250,250 210,180 230,260 250,290" fill="url(#metalDark)" />

    <polygon points="230,280 270,280 290,320 210,320" fill="url(#metalDark)" />
  </g>

  <g fill="#F0ABFC" filter="url(#glowPink)">
    <polygon points="215,160 240,175 220,185" />
    <polygon points="285,160 260,175 280,185" />
  </g>

  <g transform="translate(250, 310)">
    <circle r="40" fill="#0F0F1A" stroke="#38BDF8" stroke-width="4" filter="url(#glowBlue)"/>
    <circle r="25" fill="none" stroke="#D946EF" stroke-width="4" stroke-dasharray="8 8" filter="url(#glowPink)">
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="10s" repeatCount="indefinite"/>
    </circle>
    <circle r="12" fill="#22D3EE" filter="url(#glowBlue)"/>
    <circle r="5" fill="#FFFFFF" />
  </g>

  <text x="250" y="415" font-family="'Trebuchet MS', 'Arial Black', sans-serif" font-size="46" font-weight="900" fill="#FFFFFF" text-anchor="middle" letter-spacing="2">
    CHRONOFORGE
  </text>
  <text x="250" y="415" font-family="'Trebuchet MS', 'Arial Black', sans-serif" font-size="46" font-weight="900" fill="none" stroke="#06B6D4" stroke-width="2" text-anchor="middle" letter-spacing="2" filter="url(#glowBlue)">
    CHRONOFORGE
  </text>

  <text x="250" y="465" font-family="'Arial Black', Impact, sans-serif" font-size="34" font-weight="bold" fill="url(#goldGrad)" text-anchor="middle" letter-spacing="6">
    ARENA
  </text>
  <text x="250" y="465" font-family="'Arial Black', Impact, sans-serif" font-size="34" font-weight="bold" fill="none" stroke="#FF4500" stroke-width="1.5" text-anchor="middle" letter-spacing="6" opacity="0.8">
    ARENA
  </text>

</svg>